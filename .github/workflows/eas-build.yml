name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    name: EAS Build (${{ inputs.profile }} / ${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: pnpm install --frozen-lockfile
      - name: EAS Build
        run: |
          cd apps/mobile
          eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive --no-wait

# 본 워크플로는 manual trigger.
# Production builds는 W17 베타 시작 직전부터 사용 (CC2-21 키 백업 절차 완료 후).
# autoIncrement는 eas.json production profile에서 설정.
