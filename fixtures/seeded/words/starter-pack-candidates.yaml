quality_gates:
  - 필수 필드 존재
  - 한글 표기 NFC normalize
  - RR Revised Romanization 일치
  - gloss 1-5 단어
  - 예문 i+1 (학습 어휘 + 1 신규)
  - 금지/민감 표현 없음
  - distractor 동의어/완전 무관 회피 (cosine 0.3-0.7)
  - audio_hash 검증

risks_local:
  - "받침 발음 변화 단어 다수 (좋아요→[조아요], 맛있어요→[마시써요]) — RR 표기는 표준, audio가 진실"
  - "은/는, 이/가 패턴은 단어 카운트 1로 처리 (Q-LD-DOC-008) — UX에서 '단어'로 부르지 않음 옵션 검토"
