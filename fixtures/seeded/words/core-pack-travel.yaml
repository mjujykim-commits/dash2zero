risks_local:
  - "한국 음식 (떡볶이/치킨/소주) 외래어 표기 — K-drama pack과 일부 중복 가능. core-travel은 음식점 어휘 강조"
  - "비상 표현 (도와주세요/길을 잃었어요/경찰) 학습자에게 critical — beta 모집 글에 별도 강조"
  - "현금 vs 카드 — 한국은 카드 결제가 일반적이지만 시장/소상공인은 현금 우선 (문화 컨텍스트 caption M4)"
  - "받침 변화 단어 ~10개 (도와주세요→[도와주세요], 영어 할 수 있어요 등) TTS audio QA 필수"
