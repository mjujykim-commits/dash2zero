quality_gates_applied:
  - G-01 필수 필드: 60/60 통과 (audio_url / audio_hash는 TTS 후 채움)
  - G-02 NFC normalize: 60/60 통과
  - G-03 RR 발음 기준: 60/60 적용 (받침 변화는 audio_qc에서 확인)
  - G-04 gloss 1-5 단어 + slash: 60/60 통과
  - G-05 example_ko i+1: starter 60 + 본 pack 내 학습 어휘만 사용 (단어 순서 정합)
