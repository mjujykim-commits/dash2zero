  i18n/timezone — KST(UTC+9) 기준 04:00 reset이 UTC 기준이 아닌 사용자 로컬 04:00에 발생.
  UTC 19:00 = KST 04:00 다음날. 같은 한국 사용자가 UTC 18:59 attempt 직후 UTC 19:01 attempt 시
