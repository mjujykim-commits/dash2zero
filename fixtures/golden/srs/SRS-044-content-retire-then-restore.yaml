id: SRS-044
description: 단어가 retire되었다가(words.retired_at != null) 같은 단어가 errata 수정 후 restore(retired_at = null). 사용자 user_word_states는 보존되어 restore 후 정상 attempt 가능.
category: content_retire
input:
  user_id: u-test-044
  word_id: w-restored-1
  # 시나리오:
  # 1) 사용자가 stage 3까지 학습 (state 보존)
  # 2) 콘텐츠 admin이 5/05에 retire (재고 정리)
  # 3) 5/07에 errata 수정 후 restore (retired_at = null)
  # 4) 5/08 사용자 정답 → stage 3 → 4 정상 적용
  current_state:
    stage: 3
    weak: false
    correct_count: 2
    incorrect_count: 0
    last_attempt_at: 2026-05-01T17:00:00Z   # 7일 전 (retire 직전 마지막 attempt)
    last_attempt_correct: true
    next_due_at: 2026-05-08T11:00:00Z
    mastered_at: null
  attempt:
    correct: true
    occurred_at: 2026-05-08T17:00:00Z
    timezone: America/Los_Angeles
expected:
  stage: 4   # restore 후 정상 stage 전이
  weak: false
  correct_count: 3
  incorrect_count: 0
  last_attempt_correct: true
  mastered_at: null
  next_due_at_after_days: 14
# 통합 검증: submit-attempt가 retired_at IS NULL 조건만 보고 정상 처리
# user_word_states 보존 정책: words 테이블 retire/restore가 user_word_states를 cascade하지 않음 (Q-CO-DOC-003)
