# Security review note (W15):
#   위협 모델: STRIDE/Tampering (append-only 위반 = CC-16 위반).
#   learning_attempts는 INSERT만 허용, UPDATE/DELETE policy 의도적 부재 → default-deny.
#   사용자가 본인 attempt의 'correct' 필드를 사후 변조 = SRS 점수 조작 = 학습 데이터 무결성 붕괴.
#   policy: attempt_owner_insert / attempt_owner_select 만 존재. UPDATE policy 부재 = 차단.
#   static 분석으로 검출 가능 — UPDATE에 매칭되는 policy 0건 = default-deny 판정.
id: RLS-ADV-007
description: 인증 사용자가 본인 learning_attempt row의 'correct' 필드를 UPDATE 시도 (사후 변조)
threat_model: STRIDE/Tampering
input:
  attacker_role: authenticated
  target:
    table: learning_attempts
    user_id: 11111111-1111-1111-1111-111111111111
    endpoint: PostgREST PATCH /learning_attempts?attempt_id=eq.att-001
  payload:
    sql: "UPDATE learning_attempts SET correct = TRUE WHERE attempt_id = 'att-001'"
    correct: true
expected:
  blocked: true
  http_status: 403   # UPDATE policy 부재 → default-deny → 0 row 영향, PostgREST 403 또는 200+0row
  audit_logged: true # append-only 위반 시도는 P2 alert 대상
