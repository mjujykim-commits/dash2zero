# Security review note (W15): cross-user PII read — uws_owner_select USING(auth.uid()=user_id) owner-only로 차단. P1 alert (5분 dedup). static 매트릭스 cover OK.
id: RLS-ADV-001
description: 인증 사용자가 다른 user의 user_word_state row 읽기 시도 (ADR-0004 default-deny)
threat_model: STRIDE/Information Disclosure
input:
  attacker_role: authenticated
  target:
    table: user_word_states
    user_id: 11111111-1111-1111-1111-111111111111  # 공격자
    queried_user_id: 22222222-2222-2222-2222-222222222222  # 피해자
  payload:
    sql: "SELECT * FROM user_word_states WHERE user_id = '22222222-2222-2222-2222-222222222222'"
expected:
  blocked: true       # RLS USING (user_id = auth.uid()) 정책으로 row 0건 반환
  row_count: 0
  http_status: 200    # RLS는 row를 hide하지 deny error 발생 안 함
  audit_logged: false # SELECT는 audit_log 대상 아님 (write만)
