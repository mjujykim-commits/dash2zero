# Security review note (W15):
#   위협 모델: STRIDE/Information Disclosure (cross-user PII).
#   content_reports는 신고자가 본인 신고만 SELECT 가능. 다른 사용자의 신고 내용 조회 시
#   reporter PII (user_id, device_id) 및 신고 대상 word 노출 = harassment 가능성.
#   policy: report_owner_select USING(auth.uid() = reporter_user_id) — owner-only.
#   static 분석으로 검출 가능 — owner-only USING 패턴 매칭 (rolesMatch + isOwnerOnlyPredicate 확장 필요:
#   현재 'auth.uid()=reporter_user_id'는 isOwnerOnlyPredicate에 포함되어 있음, OK).
id: RLS-ADV-008
description: 인증 사용자가 다른 사용자의 content_reports row SELECT 시도
threat_model: STRIDE/Information Disclosure
input:
  attacker_role: authenticated
  target:
    table: content_reports
    user_id: 11111111-1111-1111-1111-111111111111            # 공격자
    queried_user_id: 22222222-2222-2222-2222-222222222222    # 피해 신고자
    endpoint: PostgREST GET /content_reports?reporter_user_id=eq.22222222-2222-2222-2222-222222222222
  payload:
    sql: "SELECT * FROM content_reports WHERE reporter_user_id = '22222222-2222-2222-2222-222222222222'"
expected:
  blocked: true
  row_count: 0
  http_status: 200    # RLS row hide
  audit_logged: false
