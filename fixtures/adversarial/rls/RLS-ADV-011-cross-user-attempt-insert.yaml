# Backend review note (W15):
#   attempt_owner_insert WITH CHECK (auth.uid() = user_id) — 다른 user_id로 INSERT 시 차단.
#   SRS state 위변조 시도 (다른 사용자 학습 기록 위조) 위협.
#   PostgREST는 WITH CHECK 위반 시 403 반환.
id: RLS-ADV-011
description: 인증 사용자가 다른 user의 user_id 로 learning_attempts INSERT 시도
threat_model: STRIDE/Tampering
input:
  attacker_role: authenticated
  target:
    table: learning_attempts
    user_id: 11111111-1111-1111-1111-111111111111   # 공격자 본인
    endpoint: PostgREST POST /learning_attempts
  payload:
    user_id: 22222222-2222-2222-2222-222222222222   # 피해자 (위조 대상)
    word_id: w-st-001
    correct: true
expected:
  blocked: true
  http_status: 403   # WITH CHECK 위반
  audit_logged: true # 위반 시도는 audit_log 기록 (M3 W15에 보강 예정)
