# Security review note (W15):
#   위협 모델: STRIDE/Elevation of Privilege (만료 후 권한 유지).
#   premium 만료/expired 사용자가 premium audio_assets에 계속 접근하면 매출 손실 + license 위반.
#   policy: audio_authenticated_select USING(... e.status IN ('active','grace_period',
#           'billing_retry','cancelled') AND (period_ends_at IS NULL OR period_ends_at > NOW()))
#   주의: 'cancelled' + 미래 period_ends_at은 정당 (해지 후 잔여기간). 'expired'만 차단.
#   static 분석은 status enum + period_ends_at 시간 비교를 재현 못 함 → W16 hybrid 필수.
id: RLS-ADV-006
description: status='expired' 또는 period_ends_at 과거인 사용자가 tier='premium' audio_asset SELECT 시도
threat_model: STRIDE/Elevation of Privilege
input:
  attacker_role: authenticated
  target:
    table: audio_assets
    user_id: 11111111-1111-1111-1111-111111111111  # entitlement.status='expired'
    endpoint: PostgREST GET /audio_assets?asset_id=eq.aud-prem-042
  payload:
    sql: "SELECT * FROM audio_assets WHERE asset_id = 'aud-prem-042' AND tier = 'premium'"
expected:
  blocked: true
  row_count: 0       # EXISTS 서브쿼리 실패 → premium row hide, free row만 반환됐을 텐데 query는 premium 한정
  http_status: 200
  audit_logged: false
