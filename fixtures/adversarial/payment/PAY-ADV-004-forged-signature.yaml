id: PAY-ADV-004
description: 잘못된 Authorization Bearer로 webhook 위조 시도 — 401 (BOOTSTRAP_INFRA §3.3)
threat_model: STRIDE/Spoofing
input:
  attacker_role: external_webhook_caller
  target:
    endpoint: POST /functions/v1/revenuecat-webhook
  payload:
    authorization: Bearer attacker_made_up_secret
    event:
      id: evt_forge_77777
      type: INITIAL_PURCHASE
      app_user_id: 11111111-1111-1111-1111-111111111111
expected:
  blocked: true
  http_status: 401
  outcome: invalid_signature
  state_changed: false
  audit_logged: true  # M3 W15에서 audit_log + Slack alert 채널 연결 예정
